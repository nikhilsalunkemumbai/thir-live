# .github/workflows/pipeline.yml
#
# THIR LIVE PIPELINE
# Runs every hour. Fetches Cowrie honeypot data from AWS EC2 Ubuntu,
# processes it through the tool chain, and pushes updated JSON to
# data/ so the dashboard at threats.aegispub.com stays live.
#
# TOOL EXECUTION ORDER:
#   Tool 05 → check VPS alive            → data/posture.json + data/assets.json
#   scp     → fetch Cowrie log           → /tmp/cowrie.json
#   Tool 26 → parse sessions → IR cases  → data/ir_cases.json
#   Tool 27 → enrich attacker IPs        → data/threat_ips.json
#   Tool 29 → filter false positives     → data/fp_filter.json
#   Tool 30 → aggregate all metrics      → data/stats.json
#   [cond]  → check for downloads        → (bool flag)
#   [cond]  → fetch downloads (if any)   → /tmp/cowrie-downloads/
#   Tool 31 → malware analysis (if any)  → data/malware_report.json
#   Tool 35 → SSH fingerprint aggregator → data/ssh_fingerprints.json
#   Tool 36 → command clustering         → data/command_clusters.json
#   Tool 30b→ ASN clustering             → data/asn_clusters.json
#   Tool 33 → YARA classifier (cond.)    → data/yara_matches.json
#   Tool 28 → SOC handover report        → data/soc_handover.md
#   Tool 37 → alert engine               → data/alert_history.json
#   Tool 32 → save daily + peak stats    → reports/daily/soc_YYYY-MM-DD.md
#   Tool 32 → weekly/monthly rollup      → reports/weekly/ or reports/monthly/
#   Tool 07 → verify data integrity      → (exit code check)
#   git     → commit + push data/ reports/
#
# IMPORTANT: Tool 31 runs BEFORE Tool 28 so the SOC handover report
#            always contains current-run malware analysis results.
#
# SECRETS REQUIRED (repo Settings → Secrets → Actions):
#   ORACLE_VPS_SSH_KEY    Private SSH key for scp access to AWS EC2
#   ORACLE_VPS_IP         Public IP of AWS EC2 running Cowrie
#   ABUSEIPDB_API_KEY     AbuseIPDB free account (1000 checks/day)
#   OTX_API_KEY           AlienVault OTX free account
#   VIRUSTOTAL_API_KEY    VirusTotal free account (optional — Tool 31)
#   ALERT_CHANNEL         slack|email|both|dry-run (optional — Tool 37, default: dry-run)
#   SLACK_WEBHOOK_URL     Slack incoming webhook URL (optional — Tool 37)
#   SMTP_HOST/USER/PASS   SMTP credentials (optional — Tool 37 email)
#
# NOTE: All SSH/SCP connections use port 22222 (real EC2 management port).
#       Port 22 on EC2 is redirected to Cowrie via iptables — never use
#       port 22 for pipeline access or you will land in the honeypot.

name: THIR Live Pipeline

on:
  schedule:
    - cron: '0 */2 * * *'    # every 2 hours — normal pipeline run
    - cron: '5 0 * * 1'      # Monday 00:05 UTC — weekly rollup trigger
    - cron: '10 0 1 * *'     # 1st of month 00:10 UTC — monthly rollup trigger
  workflow_dispatch:          # manual trigger from Actions tab

# Prevent overlapping runs if previous hour's job is still running
concurrency:
  group: thir-pipeline
  cancel-in-progress: false

jobs:
  update-threat-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # kill the whole job if it hangs beyond 20 min

    # Write permission needed to push data/ updates back to repo
    permissions:
      contents: write

    steps:

      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # 2. Language runtimes
      # ----------------------------------------------------------------
      - name: Set up Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false   # no go.mod in this repo — disable module cache

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ----------------------------------------------------------------
      # 3. Write SSH key for AWS EC2 access
      # ----------------------------------------------------------------
      - name: Prepare SSH key
        run: |
          printf '%s\n' "${{ secrets.ORACLE_VPS_SSH_KEY }}" > /tmp/vps_key
          chmod 600 /tmp/vps_key

      # ----------------------------------------------------------------
      # 4. Tool 05 — check honeypot is alive
      #    Checks Cowrie SSH port 2222 (not 22 — 22 goes to honeypot).
      #    Writes data/posture.json with UP/DOWN status.
      #    Writes data/assets.json with live asset inventory (ID.AM-1).
      #    continue-on-error: true so pipeline keeps running even if
      #    EC2 is temporarily unreachable.
      # ----------------------------------------------------------------
      - name: Tool 05 — network monitor (honeypot liveness + asset inventory)
        continue-on-error: true
        timeout-minutes: 3
        env:
          VPS_IP: ${{ secrets.ORACLE_VPS_IP }}
        run: |
          go run tools/05_network_monitor_live.go \
            -h "$VPS_IP" \
            -p 2222 \
            --json \
            -o data/posture.json \
            --assets data/assets.json \
            -v

      # ----------------------------------------------------------------
      # 5. Pre-flight — verify EC2 reachable via SSH on port 22222
      #    IMPORTANT: Uses port 22222 — the real EC2 management port.
      #    Port 22 on this EC2 redirects to Cowrie honeypot via iptables.
      #    continue-on-error: true — failure is logged but pipeline continues.
      # ----------------------------------------------------------------
      - name: Pre-flight — verify EC2 SSH + Cowrie log path
        continue-on-error: true
        timeout-minutes: 2
        env:
          VPS_IP: ${{ secrets.ORACLE_VPS_IP }}
        run: |
          echo "━━━ [PRE-FLIGHT] Testing SSH connection to ${VPS_IP}:22222 ━━━"
          ssh \
            -i /tmp/vps_key \
            -p 22222 \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o BatchMode=yes \
            "ubuntu@${VPS_IP}" \
            "echo '[OK] SSH auth success' && \
             echo '[INFO] Hostname: '$(hostname) && \
             echo '[INFO] Cowrie log dir contents:' && \
             ls -lh /home/cowrie/cowrie/var/log/cowrie/ && \
             echo '[INFO] cowrie.json size:' $(du -sh /home/cowrie/cowrie/var/log/cowrie/cowrie.json) && \
             echo '[OK] Pre-flight passed'"
          echo "━━━ [PRE-FLIGHT] Done ━━━"

      # ----------------------------------------------------------------
      # 6. Fetch Cowrie logs from AWS EC2
      #    Uses port 22222 for SCP — NOT port 22 (that goes to Cowrie).
      #    continue-on-error: true — if VPS unreachable, skip gracefully.
      #
      #    WATERMARK-BASED INCREMENTAL FETCH (added 2026-03-19):
      #    cowrie.json on the VPS is an append-only log that grows without
      #    bound. Fetching + parsing the full file every 2 hours causes:
      #      - SCP transfer time to grow linearly (22k+ lines = slow)
      #      - Tool 26 reprocessing identical sessions each run
      #      - IP count inflation in stats.json / threat_ips.json
      #
      #    Strategy: record the last-processed line count in
      #    data/cowrie_watermark.json after each successful run.
      #    On the next run, SSH to the VPS and use `tail -n +N` to extract
      #    only new lines since the watermark. This keeps each pipeline run
      #    processing only the delta — typically 50-200 lines per 2h window.
      #
      #    Fallback: if watermark is missing or VPS line count < watermark
      #    (log rotation occurred), fall back to full fetch.
      # ----------------------------------------------------------------
      - name: Fetch Cowrie logs from AWS EC2
        id: fetch_logs
        continue-on-error: true
        timeout-minutes: 5
        env:
          VPS_IP: ${{ secrets.ORACLE_VPS_IP }}
        run: |
          COWRIE_LOG="/home/cowrie/cowrie/var/log/cowrie/cowrie.json"
          WATERMARK_FILE="data/cowrie_watermark.json"
          LOCAL_LOG="/tmp/cowrie.json"

          echo "━━━ [SCP] Fetching cowrie.json from ${VPS_IP}:22222 ━━━"

          # Read last watermark (line number of last-processed line)
          LAST_LINE=0
          if [ -f "$WATERMARK_FILE" ]; then
            LAST_LINE=$(python3 -c "
          import json, sys
          try:
            d = json.load(open('$WATERMARK_FILE'))
            print(int(d.get('last_line', 0)))
          except:
            print(0)
          ")
            echo "[SCP] Watermark: last processed line ${LAST_LINE}"
          else
            echo "[SCP] No watermark found — full fetch"
          fi

          # Get current line count on VPS
          VPS_LINES=$(ssh \
            -i /tmp/vps_key \
            -p 22222 \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o BatchMode=yes \
            "ubuntu@${VPS_IP}" \
            "wc -l < ${COWRIE_LOG}" 2>/dev/null || echo "0")
          VPS_LINES=$(echo "$VPS_LINES" | tr -d '[:space:]')
          echo "[SCP] VPS log has ${VPS_LINES} lines total"

          # If watermark > VPS lines, log was rotated — reset and full fetch
          if [ "$LAST_LINE" -gt "$VPS_LINES" ]; then
            echo "[SCP] Watermark (${LAST_LINE}) > VPS lines (${VPS_LINES}) — log rotated, resetting"
            LAST_LINE=0
          fi

          if [ "$LAST_LINE" -gt 0 ] && [ "$VPS_LINES" -gt "$LAST_LINE" ]; then
            # Incremental fetch: only new lines since watermark
            NEW_LINES=$(( VPS_LINES - LAST_LINE ))
            echo "[SCP] Fetching ${NEW_LINES} new line(s) (lines $((LAST_LINE+1))–${VPS_LINES})"
            ssh \
              -i /tmp/vps_key \
              -p 22222 \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=60 \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=3 \
              "ubuntu@${VPS_IP}" \
              "tail -n +$((LAST_LINE+1)) ${COWRIE_LOG}" > "$LOCAL_LOG"
          else
            # Full fetch (first run or log rotated)
            echo "[SCP] Full fetch"
            scp \
              -P 22222 \
              -i /tmp/vps_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=60 \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=3 \
              "ubuntu@${VPS_IP}:${COWRIE_LOG}" \
              "$LOCAL_LOG"
          fi

          FETCHED=$(wc -l < "$LOCAL_LOG" 2>/dev/null || echo 0)
          echo "[SCP] Fetched ${FETCHED} line(s) this run"
          echo "━━━ [SCP] Done ━━━"

          # Save new watermark (total VPS line count after this fetch)
          python3 -c "
          import json
          wm = {'last_line': int('${VPS_LINES}'), 'updated_at': __import__('datetime').datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')}
          json.dump(wm, open('$WATERMARK_FILE', 'w'), indent=2)
          print(f'[SCP] Watermark saved → {wm}')
          "

      # ----------------------------------------------------------------
      # 7. Tool 26 — parse Cowrie sessions → IR cases
      # ----------------------------------------------------------------
      - name: Tool 26 — incident timeline (Cowrie → IR cases)
        run: |
          python tools/26_incident_timeline_live.py \
            --input-glob "/tmp/cowrie*.json" \
            --output data/ir_cases.json \
            --verbose

      # ----------------------------------------------------------------
      # 7.a Tool 34 — credential extractor
      #    Reads /tmp/cowrie*.json directly (same log fetched in Step 6).
      #    Extracts all username/password pairs (failed + success),
      #    top usernames, top passwords, top pairs, and success pairs.
      #    Output: data/credentials.json  (consumed by Tool 28 + 37).
      # ----------------------------------------------------------------
      - name: Tool 34 — credential extractor
        continue-on-error: true
        timeout-minutes: 3
        run: |
          python tools/34_credential_extractor_live.py \
            --input  /tmp/cowrie.json \
            --output data/credentials.json \
            --verbose

      # ----------------------------------------------------------------
      # 7.b Tool 35 — SSH fingerprint aggregator
      #    Reads data/ir_cases.json (Tool 26 output).
      #    Computes HASSH fingerprints, maps client families, detects
      #    botnet KEX signatures. Output: data/ssh_fingerprints.json.
      # ----------------------------------------------------------------
      - name: Tool 35 — SSH fingerprint aggregator
        continue-on-error: true
        timeout-minutes: 3
        run: |
          python tools/35_ssh_fingerprint_live.py \
            --input  data/ir_cases.json \
            --output data/ssh_fingerprints.json

      # ----------------------------------------------------------------
      # 7.c Tool 36 — command clustering
      #    Reads data/ir_cases.json (Tool 26 output).
      #    Groups sessions by Jaccard similarity of command sequences.
      #    Detects known campaigns (mdrfckr, XMRig, Mirai, Tsunami).
      #    Output: data/command_clusters.json.
      # ----------------------------------------------------------------
      - name: Tool 36 — command clustering
        continue-on-error: true
        timeout-minutes: 3
        run: |
          python tools/36_command_clustering_live.py \
            --input     data/ir_cases.json \
            --output    data/command_clusters.json \
            --threshold 0.7

      # ----------------------------------------------------------------
      # 8. Extract unique attacker IPs for Tool 27
      # ----------------------------------------------------------------
      - name: Extract attacker IPs from IR cases
        run: |
          python -c "
          import json, sys
          with open('data/ir_cases.json') as f:
              data = json.load(f)
          ips = sorted({c['src_ip'] for c in data.get('cases', []) if c.get('src_ip')})
          print(f'[INFO] Extracted {len(ips)} unique attacker IP(s)', file=sys.stderr)
          print('\n'.join(ips))
          " > /tmp/attacker_ips.txt

      # ----------------------------------------------------------------
      # 9. Tool 27 — enrich attacker IPs (AbuseIPDB + OTX)
      # ----------------------------------------------------------------
      - name: Tool 27 — threat intel feeder (IP enrichment)
        timeout-minutes: 5
        env:
          ABUSEIPDB_API_KEY: ${{ secrets.ABUSEIPDB_API_KEY }}
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
        run: |
          go run tools/27_threat_intel_feeder_live.go \
            --input /tmp/attacker_ips.txt \
            --output data/threat_ips.json \
            -v

      # ----------------------------------------------------------------
      # 10. Tool 29 — false positive filter
      # ----------------------------------------------------------------
      - name: Tool 29 — false positive tracker
        run: |
          python tools/29_false_positive_live.py \
            --input data/ir_cases.json \
            --threat-ips data/threat_ips.json \
            --output data/fp_filter.json \
            --threshold 25 \
            --verbose

      # ----------------------------------------------------------------
      # 11. Tool 30 — aggregate pipeline metrics
      # ----------------------------------------------------------------
      - name: Tool 30 — metric dashboard exporter
        timeout-minutes: 3
        run: |
          go run tools/30_metric_exporter_live.go \
            --ir-cases   data/ir_cases.json   \
            --fp-filter  data/fp_filter.json  \
            --threat-ips data/threat_ips.json \
            --posture    data/posture.json    \
            --output     data/stats.json      \
            -v


      # ----------------------------------------------------------------
      # 11.b2 Tool 30b — ASN clustering
      #    Reads data/threat_ips.json (Tool 27 output).
      #    Groups attacker IPs by ASN, tags Tor/VPN/proxy infrastructure.
      #    Output: data/asn_clusters.json → read by Tool 28 + Tool 37.
      #    continue-on-error: true — missing file won't break pipeline.
      # ----------------------------------------------------------------
      - name: Tool 30b — ASN clustering
        continue-on-error: true
        timeout-minutes: 3
        run: |
          go run tools/30b_asn_clustering_live.go \
            --input  data/threat_ips.json \
            --output data/asn_clusters.json

      # ----------------------------------------------------------------
      # 11.a Check for Cowrie downloads — sets DOWNLOADS_FOUND output
      #
      # Runs HERE (before Tool 28) so that Tool 31 can complete and
      # write malware_report.json before the SOC report is generated.
      # Tool 28 reads malware_report.json — if Tool 31 runs after it,
      # the SOC report always contains stale or missing malware data.
      # ----------------------------------------------------------------
      - name: Check for Cowrie downloads in IR cases
        id: check_downloads
        run: |
          DOWNLOADS_FOUND=$(python -c "
          import json, sys
          try:
              with open('data/ir_cases.json') as f:
                  data = json.load(f)
              has_downloads = any(
                  c.get('downloads') for c in data.get('cases', [])
              )
              print('true' if has_downloads else 'false')
          except Exception:
              print('false')
          ")
          echo "DOWNLOADS_FOUND=${DOWNLOADS_FOUND}" >> $GITHUB_OUTPUT
          echo "[Tool 31] Downloads detected: ${DOWNLOADS_FOUND}"

      # ----------------------------------------------------------------
      # 11.b Fetch Cowrie downloads from VPS (on-demand)
      #    Uses port 22222 for SCP — NOT port 22.
      #    Only runs when downloads detected in IR cases.
      #    Caps at 50 files to avoid runaway storage/time usage.
      # ----------------------------------------------------------------
      - name: Fetch Cowrie downloads from VPS (on-demand)
        id: fetch_downloads
        if: steps.check_downloads.outputs.DOWNLOADS_FOUND == 'true'
        continue-on-error: true
        timeout-minutes: 5
        env:
          VPS_IP: ${{ secrets.ORACLE_VPS_IP }}
        run: |
          echo "━━━ [SCP] Downloads detected — fetching from ${VPS_IP}:22222 ━━━"
          mkdir -p /tmp/cowrie-downloads

          scp -r \
            -P 22222 \
            -i /tmp/vps_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=60 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            "ubuntu@${VPS_IP}:/home/cowrie/cowrie/var/lib/cowrie/downloads/." \
            /tmp/cowrie-downloads/

          FILE_COUNT=$(find /tmp/cowrie-downloads -type f | wc -l)
          echo "━━━ [SCP] Fetched ${FILE_COUNT} file(s) ━━━"

          if [ "$FILE_COUNT" -gt 50 ]; then
            echo "[WARN] Unusually high file count (${FILE_COUNT}) — capping at 50"
            find /tmp/cowrie-downloads -type f | sort | tail -n +51 | xargs rm -f
          fi

      # ----------------------------------------------------------------
      # 11.c Tool 31 — Malware Analyzer (on-demand)
      #    Only runs when downloads were found and fetched.
      #    Output: data/malware_report.json
      #
      #    Runs BEFORE Tool 28 so the SOC handover report contains
      #    current-run malware findings, not stale data from last run.
      #
      #    Tool 31 handles:
      #      - 0-byte files (empty upload attempts) — recorded with notes
      #      - Hidden files (.gitignore, etc.) — silently skipped
      #      - Known-clean hashes (e3b0c442...) — excluded from report
      #      - VirusTotal lookup (optional, free tier safe)
      # ----------------------------------------------------------------
      - name: Tool 31 — Malware Analyzer (on-demand)
        if: steps.check_downloads.outputs.DOWNLOADS_FOUND == 'true'
        continue-on-error: true
        timeout-minutes: 10
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          FILE_COUNT=$(find /tmp/cowrie-downloads -type f 2>/dev/null | wc -l)

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "[Tool 31] No files in /tmp/cowrie-downloads — skipping"
            exit 0
          fi

          echo "━━━ [Tool 31] Analyzing ${FILE_COUNT} captured file(s) ━━━"

          python tools/31_malware_analyzer_live.py \
            --input   /tmp/cowrie-downloads \
            --output  data/malware_report.json \
            --vt-key  "${VIRUSTOTAL_API_KEY}" \
            --verbose

          python -c "
          import json, sys
          try:
              with open('data/malware_report.json') as f:
                  report = json.load(f)
              high = [s for s in report.get('samples', []) if s.get('severity') == 'HIGH']
              if high:
                  print(f'[Tool 31] ⚠️  HIGH SEVERITY: {len(high)} sample(s)')
                  for s in high:
                      print(f'  → {s[\"file_name\"]} | score:{s[\"threat_score\"]} | {s[\"file_type\"]}')
                      vt = s.get('virustotal')
                      if vt and vt.get('malicious', 0) > 0:
                          print(f'    VT: {vt[\"malicious\"]}/{vt[\"total\"]} detections — {vt[\"vt_link\"]}')
              else:
                  print(f'[Tool 31] {report.get(\"total_files\",0)} file(s) analyzed — no HIGH severity')
          except Exception as e:
              print(f'[Tool 31] Could not parse report: {e}', file=sys.stderr)
          "


      # ----------------------------------------------------------------
      # 11.c2 Tool 33 — YARA classifier (on-demand)
      #    Runs after Tool 31 — same download files, different analysis.
      #    Classifies malware families via YARA rules + heuristic fallback.
      #    Only runs when downloads were fetched (same condition as Tool 31).
      #    Output: data/yara_matches.json → read by Tool 28 + Tool 37.
      # ----------------------------------------------------------------
      - name: Tool 33 — YARA classifier (on-demand)
        if: steps.check_downloads.outputs.DOWNLOADS_FOUND == 'true'
        continue-on-error: true
        timeout-minutes: 5
        run: |
          python tools/33_yara_classifier_live.py \
            --downloads   /tmp/cowrie-downloads \
            --rules       tools/yara_rules \
            --output      data/yara_matches.json \
            --max-size-mb 50

      # ----------------------------------------------------------------
      # 11.d Tool 28 — SOC Handover Report
      #
      #    Runs AFTER Tool 31 — malware_report.json is now current.
      #    Reads all pipeline outputs and generates a structured Markdown
      #    shift handover report with:
      #      - Priority Cases (auth success / commands / downloads)
      #      - Reconnaissance table (grouped by IP, 120-min window)
      #      - Malware analysis results (from Tool 31 this run)
      #      - Top attacker IPs, TTPs, FP summary, pipeline health
      # ----------------------------------------------------------------
      - name: Tool 28 — SOC Handover Report
        continue-on-error: true
        timeout-minutes: 3
        run: |
          python tools/28_soc_handover_live.py \
            --ir-cases       data/ir_cases.json \
            --threat-ips     data/threat_ips.json \
            --fp-filter      data/fp_filter.json \
            --stats          data/stats.json \
            --malware-report data/malware_report.json \
            --output         data/soc_handover.md \
            --verbose


      # ----------------------------------------------------------------
      # 11.d2 Tool 37 — alert engine
      #    Fires on HIGH/CRITICAL malware, new successful-auth IPs,
      #    new ASN clusters, TCP tunnel attempts, active campaigns.
      #    Channel set via ALERT_CHANNEL secret (slack/email/both/dry-run).
      #    Defaults to dry-run if secret not set — safe on first deploy.
      #    Output: data/alert_history.json (dedup state).
      # ----------------------------------------------------------------
      - name: Tool 37 — alert engine
        continue-on-error: true
        timeout-minutes: 3
        env:
          ALERT_CHANNEL:    ${{ secrets.ALERT_CHANNEL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SMTP_HOST:        ${{ secrets.SMTP_HOST }}
          SMTP_PORT:        ${{ secrets.SMTP_PORT }}
          SMTP_USER:        ${{ secrets.SMTP_USER }}
          SMTP_PASS:        ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO:   ${{ secrets.ALERT_EMAIL_TO }}
        run: |
          python tools/37_alerts_live.py \
            --malware-report   data/malware_report.json \
            --yara-matches     data/yara_matches.json \
            --credentials      data/credentials.json \
            --asn-clusters     data/asn_clusters.json \
            --ir-cases         data/ir_cases.json \
            --command-clusters data/command_clusters.json \
            --alert-history    data/alert_history.json \
            --channel          "${ALERT_CHANNEL:-dry-run}"

      # ----------------------------------------------------------------
      # 11.e Tool 32 — Save daily report + update peak stats (every run)
      #   - Copies data/soc_handover.md → reports/daily/soc_YYYY-MM-DD.md
      #   - Updates peak_sessions / peak_unique_ips / peak_confirmed_threats
      #     in data/stats.json — never overwritten by a quieter day
      #
      #   Runs after Tool 28 so the archived daily report is complete,
      #   including malware findings from Tool 31.
      # ----------------------------------------------------------------
      - name: Tool 32 — Save daily report + peak stats
        continue-on-error: true
        run: |
          python tools/32_report_lifecycle.py \
            --save-daily \
            --report data/soc_handover.md \
            --stats  data/stats.json \
            --verbose

      # ----------------------------------------------------------------
      # 11.f Tool 32 — Conditional rollup (weekly / monthly)
      #   Monday 00:00 UTC       → weekly rollup
      #   1st of month 00:00 UTC → monthly rollup + 6-month prune
      #   All other runs         → no-op
      # ----------------------------------------------------------------
      - name: Tool 32 — Conditional rollup (weekly / monthly)
        continue-on-error: true
        run: |
          DAY_OF_WEEK=$(date -u +%u)
          DAY_OF_MONTH=$(date -u +%d)
          HOUR=$(date -u +%H)

          echo "[Tool 32] Day-of-week: ${DAY_OF_WEEK}, Day-of-month: ${DAY_OF_MONTH}, Hour: ${HOUR}"

          if [ "$DAY_OF_MONTH" = "01" ] && [ "$HOUR" = "00" ]; then
            echo "[Tool 32] Triggering MONTHLY rollup"
            python tools/32_report_lifecycle.py \
              --rollup monthly \
              --stats data/stats.json \
              --verbose

          elif [ "$DAY_OF_WEEK" = "1" ] && [ "$HOUR" = "00" ]; then
            echo "[Tool 32] Triggering WEEKLY rollup"
            python tools/32_report_lifecycle.py \
              --rollup weekly \
              --stats data/stats.json \
              --verbose

          else
            echo "[Tool 32] No rollup needed this run — skipping"
          fi

      # ----------------------------------------------------------------
      # 12. Tool 07 — file integrity verification
      #    Baseline is recreated if missing or older than 2 hours.
      #    On fresh baseline: create and record SHA-256 of all data/ files.
      #    On existing baseline: verify no unexpected modifications.
      # ----------------------------------------------------------------
      - name: Run Tool 07 — File Integrity Monitor
        continue-on-error: true
        run: |
          BASELINE="data/integrity_baseline.json"
          REBUILD=false

          if [ ! -f "$BASELINE" ]; then
            echo "[Tool 07] Baseline missing — creating fresh baseline"
            REBUILD=true
          else
            BASELINE_AGE=$(( $(date +%s) - $(date -r "$BASELINE" +%s) ))
            echo "[Tool 07] Baseline age: ${BASELINE_AGE}s"
            if [ "$BASELINE_AGE" -gt 7200 ]; then
              echo "[Tool 07] Baseline older than 2 hours — rebuilding"
              REBUILD=true
            fi
          fi

          if [ "$REBUILD" = "true" ]; then
            go run tools/07_file_integrity_live.go \
              --create-baseline "$BASELINE" \
              --path data/ \
              -v
            echo "[Tool 07] Baseline created at $(date -u)"
          else
            echo "[Tool 07] Baseline is fresh — verifying"
            go run tools/07_file_integrity_live.go \
              --verify-baseline "$BASELINE" \
              --path data/ \
              -v
          fi

      # ----------------------------------------------------------------
      # 13. Clean up sensitive files from runner
      #    Runs even if earlier steps failed (if: always()).
      #    Removes SSH key, Cowrie logs, IP list, and download dir.
      # ----------------------------------------------------------------
      - name: Clean up SSH key and temp files
        if: always()
        run: |
          rm -f  /tmp/vps_key /tmp/cowrie.json /tmp/attacker_ips.txt
          rm -rf /tmp/cowrie-downloads

      # ----------------------------------------------------------------
      # 14. Commit and push updated data/ and reports/
      #    Commit message includes case count always.
      #    Includes malware sample count when Tool 31 produced output.
      #    No-op if nothing changed (idempotent on quiet hours).
      # ----------------------------------------------------------------
      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ reports/
          if git diff --staged --quiet; then
            echo "No changes — nothing to commit"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
            CASE_COUNT=$(python -c "import json; d=json.load(open('data/ir_cases.json')); print(d.get('total_cases',0))" 2>/dev/null || echo "?")
            MALWARE_COUNT=$(python -c "import json; d=json.load(open('data/malware_report.json')); print(d.get('total_files',0))" 2>/dev/null || echo "0")
            WATERMARK=$(python -c "import json; d=json.load(open('data/cowrie_watermark.json')); print(d.get('last_line','?'))" 2>/dev/null || echo "?")
            if [ "$MALWARE_COUNT" != "0" ]; then
              git commit -m "auto: threat data update ${TIMESTAMP} (${CASE_COUNT} cases, ${MALWARE_COUNT} malware sample(s), watermark:${WATERMARK})"
            else
              git commit -m "auto: threat data update ${TIMESTAMP} (${CASE_COUNT} cases, watermark:${WATERMARK})"
            fi
            git push
          fi
